name: bullshitadditions
version: '${version}'

main: com.rgbeans.bullshit.bullshitadditions.Bullshitadditions
bootstrapper: com.rgbeans.bullshit.bullshitadditions.BullshitadditionsBootstrap
paperPluginLoader: com.rgbeans.bullshit.bullshitadditions.BullshitadditionsLoader
api-version: '26.1.2'
load: POSTWORLD

commands:
  ironbargun:
    description: Gives you a Pistol
    usage: /ironbargun
    permission: bullshitadditions.pistol
    permission-message: You do not have permission.
  pistol:
    description: Gives you a Pistol
    usage: /pistol
    permission: bullshitadditions.pistol
    permission-message: You do not have permission.
  targetdummy:
    description: Gives you a Target Dummy item
    usage: /targetdummy
    permission: bullshitadditions.targetdummy
    permission-message: You do not have permission.
  heavystick:
    description: Gives you a Heavy Stick
    usage: /heavystick
    permission: bullshitadditions.heavystick
    permission-message: You do not have permission.
  ammobox:
    description: Gives you an Ammo Box
    usage: /ammobox
    permission: bullshitadditions.ammobox
    permission-message: You do not have permission.
  rifle:
    description: Gives you a Rifle
    usage: /rifle
    permission: bullshitadditions.rifle
    permission-message: You do not have permission.
  myblicky:
    description: Gives you my blicky
    usage: /myblicky
    permission: bullshitadditions.myblicky
    permission-message: You do not have permission.
  gravitygun:
    description: Gives you a Gravity Gun
    usage: /gravitygun
    permission: bullshitadditions.gravitygun
    permission-message: You do not have permission.
  minecartspeed:
    description: View or set the max minecart speed
    usage: /minecartspeed [1-1000]
    permission: bullshitadditions.minecartspeed
    permission-message: You do not have permission.
  transmute:
    description: Opens the Transmutation Table GUI
    usage: /transmute
    permission: bullshitadditions.transmute
    permission-message: You do not have permission.
  transmutationtable:
    description: Gives you a Transmutation Table item
    usage: /transmutationtable
    permission: bullshitadditions.transmutationtable
    permission-message: You do not have permission.
  emc:
    description: Shows your EMC or reloads EMC values
    usage: /emc [reload]
    permission: bullshitadditions.emc
    permission-message: You do not have permission.
  recipes:
    description: Opens a GUI showing custom recipes
    usage: /recipes
    permission: bullshitadditions.recipes
    permission-message: You do not have permission.
  energycondenser:
    description: Gives you an Energy Condenser item
    usage: /energycondenser
    permission: bullshitadditions.energycondenser
    permission-message: You do not have permission.
  graymatter:
    description: Gives you a Gray Matter item
    usage: /graymatter
    permission: bullshitadditions.graymatter
    permission-message: You do not have permission.

permissions:
  bullshitadditions.recipes:
    description: Allows viewing custom recipes
    default: true
  bullshitadditions.pistol:
    description: Allows spawning a Pistol
    default: op
  bullshitadditions.targetdummy:
    description: Allows spawning a Target Dummy
    default: op
  bullshitadditions.heavystick:
    description: Allows spawning a Heavy Stick
    default: op
  bullshitadditions.ammobox:
    description: Allows spawning an Ammo Box
    default: op
  bullshitadditions.rifle:
    description: Allows spawning a Rifle
    default: op
  bullshitadditions.myblicky:
    description: Allows spawning my blicky
    default: op
  bullshitadditions.gravitygun:
    description: Allows spawning a Gravity Gun
    default: op
  bullshitadditions.minecartspeed:
    description: Allows viewing and setting the max minecart speed
    default: op
  bullshitadditions.transmute:
    description: Allows opening the Transmutation Table GUI
    default: op
  bullshitadditions.transmutationtable:
    description: Allows spawning a Transmutation Table item
    default: op
  bullshitadditions.emc:
    description: Allows checking EMC balance and reloading EMC values
    default: true
  bullshitadditions.energycondenser:
    description: Allows spawning an Energy Condenser item
    default: op
  bullshitadditions.graymatter:
    description: Allows spawning a Gray Matter item
    default: op
